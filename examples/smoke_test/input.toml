[structure]
outdir = "random_structures"

[references]
reference_mode = "metal"
host = "SnO2"
host_dir = "reference_structures/"
supercell = [ 3, 2, 1]
metals_ref = [ "Ti","Zr","Sb","Sn"]
oxides_dir = "reference_structures/"
fmax = 0.02
skip_if_done = false


[doping]
mode = "explicit"
host_species = "Sn"
compositions = [
  { Sb = 5.0, Ti = 5.0 },
  { Sb = 5.0, Zr = 5.0 }
]

[generate]
poscar_order = ["Ti","Zr","Sb","Sn","O"]
seed_base = 1
clean_outdir = true

[scan]
poscar_in = "POSCAR"
topk = 10
symprec = 1e-3
max_enum = 10
nproc = 4
chunksize = 10
anion_species = ["O"]
max_unique = 50000
skip_if_done = false
mode = "auto"
sample_budget = 5000
sample_batch_size = 64
sample_patience = 1000
sample_seed = 42
sample_max_saved = 10000

[relax]
fmax = 0.08
n_workers = 2
skip_if_done = false
skip_candidate_if_done = false

[filter]
mode = "topn"
max_candidates = 3
skip_if_done = false

[database]